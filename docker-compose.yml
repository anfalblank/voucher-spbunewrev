version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voucher-spbu
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./data/spbu-voucher.db
      - NODE_ENV=production
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-your-super-secret-key-change-this-in-production-min-32-chars}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://manggala.biz.id}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-your-super-secret-key-change-this-in-production-min-32-chars}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-https://manggala.biz.id}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
