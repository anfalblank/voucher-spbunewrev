version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: spbu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: spbu_user
      POSTGRES_PASSWORD: spbu_password_change_this
      POSTGRES_DB: spbu_voucher
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spbu_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spbu-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://spbu_user:spbu_password_change_this@postgres:5432/spbu_voucher
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - WHABOT_API_URL=${WHABOT_API_URL}
      - WHABOT_API_KEY=${WHABOT_API_KEY}
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./prisma:/app/prisma

volumes:
  postgres_data:
    driver: local
